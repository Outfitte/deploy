services:
  backend:
    image: ghcr.io/outfitte/backend:latest
    build: ../backend
    # No port mapping — reachable only through frontend Nginx proxy
    env_file: .env
    volumes:
      - sqlite_data:/data
      - media_storage:/data/media
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "--fail"
        - "--silent"
        - "http://localhost:${SERVER_PORT:-8080}/health"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ghcr.io/outfitte/frontend:latest
    build: ../frontend
    ports:
      - "${PORT:-30080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
  media_storage:
