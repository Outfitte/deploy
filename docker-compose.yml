services:
  backend:
    image: ghcr.io/outfitte/backend:latest
    # No port mapping — reachable only through frontend Nginx proxy
    env_file: .env
    volumes:
      - sqlite_data:/data
      - media_storage:/data/media
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "--fail"
        - "--silent"
        - "http://localhost:${SERVER_PORT:-8080}/health"
      interval: 2s
      timeout: 5s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  frontend:
    image: ghcr.io/outfitte/frontend:latest
    ports:
      - "${PORT:-30080}:80"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:8080}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
  media_storage:
