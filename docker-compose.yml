services:
  backend:
    build: ../backend
    # No port mapping — reachable only through frontend Nginx proxy
    env_file: .env
    volumes:
      - sqlite_data:/data
      - media_storage:${MEDIA_STORAGE_PATH:-/data/media}
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--no-verbose"
        - "--tries=1"
        - "--spider"
        - "http://localhost:${SERVER_PORT:-8080}/health"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ../frontend
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
  media_storage:
