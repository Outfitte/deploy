name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [backend-published, frontend-published]

jobs:
  smoke-test:
    runs-on: builder
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker pull ghcr.io/outfitte/backend:latest
          docker pull ghcr.io/outfitte/frontend:latest

      - name: Generate .env
        run: |
          cat > .env <<'EOF'
          PORT=30080
          SERVER_PORT=8080
          APP_ENV=production
          MEDIA_STORAGE_PATH=/data/media
          LOG_LEVEL=info
          DB_DRIVER=sqlite
          DB_DSN=/data/outfitte.db
          EOF
          echo "JWT_SECRET=$(openssl rand -hex 32)" >> .env

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
